<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Health with Rach - Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Anaheim:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rc-contact-wrap">
  <div class="rc-contact-photo">
    <img src="https://assets.cdn.filesafe.space/uhLI3atfL6jskyRIKRqT/media/69e31c9d8696a78b8dcbb1e1.jpg" alt="Rach">
  </div>

  <div class="rc-contact-form-col">
    <h1 class="rc-headline">Looking to <em>connect?</em></h1>
    <p class="rc-sub">Fill out the form below and I will get back to you.</p>
    <p class="rc-email-note">You can also send an email to <a href="mailto:realhealthwithrach@gmail.com">realhealthwithrach@gmail.com</a>!</p>

    <div class="rc-form-card" id="rc-form-card">
      <input class="rc-input" id="rc-first-name" type="text" placeholder="First Name" autocomplete="given-name" />
      <input class="rc-input" id="rc-email" type="email" placeholder="Email" autocomplete="email" />
      <input class="rc-input" id="rc-phone" type="tel" placeholder="Contact Phone" autocomplete="tel" />
      <textarea class="rc-input rc-textarea" id="rc-question" placeholder="Question" rows="4"></textarea>

      <p id="rc-error" class="rc-error"></p>

      <button class="rc-btn-send" id="rc-send-btn" onclick="rcSubmitContactForm()">
        <span class="rc-btn-label">Send it!</span>
        <div class="rc-spinner"></div>
      </button>
    </div>

    <div class="rc-thankyou" id="rc-thankyou">
      <h3>Thank you!</h3>
      <p>Your message has been sent. I'll get back to you soon.</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
